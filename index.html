<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <title>Port Dickson June 2026 Guide</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="guide-shell" aria-label="Port Dickson June 2026 trip guide">
      <header class="app-header">
        <p class="eyebrow">The Beach School</p>
        <h1>Port Dickson June 2026</h1>
        <p id="selected-day-summary" class="header-summary">Loading itinerary...</p>
      </header>

      <nav class="day-tabs" aria-label="Trip days" id="day-tabs"></nav>

      <section class="day-panel" aria-live="polite">
        <div class="day-heading">
          <p id="day-date" class="eyebrow">June 2026</p>
          <h2 id="day-title">Trip guide</h2>
          <p id="day-overview"></p>
        </div>

        <ol id="timeline" class="timeline"></ol>

        <aside class="packing-notes" aria-labelledby="packing-title">
          <h2 id="packing-title">Pack for this day</h2>
          <ul id="packing-list"></ul>
        </aside>

        <aside class="day-notes" aria-labelledby="notes-title">
          <h2 id="notes-title">Day notes</h2>
          <ul id="notes-list"></ul>
        </aside>
      </section>
    </main>
  </body>
</html>
